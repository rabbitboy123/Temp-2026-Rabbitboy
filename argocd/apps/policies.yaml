apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sigstore-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/rabbitboy123/Temp-2026-Rabbitboy.git
    targetRevision: main
    path: policies
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
