# Application cho AnalysisTemplate
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: analysis
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Vuong-Bach/w10.git
    path: k8s-analysis
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
